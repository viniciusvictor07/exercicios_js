<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teste de Conexão</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        transition: background 0.5s;
        gap: 30px;
      }
      button {
        padding: 15px 30px;
        font-size: 1.2rem;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background: #5f27cd;
        color: rgb(255, 255, 255);
      }
      button:hover {
        background: #341f97;
      }
      .escondido {
        opacity: 0;
        pointer-events: none;
        height: 0;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <h1>Teste de Conexão JS</h1>
    <button id="meuBotao">Clique para Ativar</button>
    <button id="meuBotaoReset" style="display: none;"">Clique para Resetar</button>
    <script src="script.js"></script>
  </body>
</html>
